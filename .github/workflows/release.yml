on:
  workflow_dispatch:
    inputs: {}
  push:
    tags:
      - '*'

name: Release

jobs:
  release:
    name: Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/',''
          dotnet build --no-restore -c Release --nologo -p:Version=$ver

      - name: Write version into manifest
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/',''
          $path = './DragAndDropTexturing/bin/x64/Release/DragAndDropTexturing.json'
          $content = get-content -path $path
          $content = $content -replace '0.0.0.0',$ver
          set-content -Path $path -Value $content

      - name: Packing Release
        run: |
          pushd DragAndDropTexturing/bin/x64/Release/
          7z a ../DragAndDropTexturing.zip *
          popd
        shell: bash

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          name: DragAndDropTexturing ${{ github.ref_name }}
          artifacts: "./DragAndDropTexturing/bin/x64/*.zip"
          tag: ${{ github.ref_name }}
          body: "A build of the Drag And Drop Texturing plugin. Do not install this manually. Install via the dalamud repo link!"
          omitBodyDuringUpdate: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.RELEASE }}

      - name: Write out feed manifests
        run: |
          $ver = '${{ github.ref_name }}'
          foreach ($path in @('./repo.json', './pluginmaster.json')) {
            $json = Get-Content -Raw $path | ConvertFrom-Json
            $json[0].AssemblyVersion = $ver
            $json[0].TestingAssemblyVersion = $ver
            $json[0].DownloadLinkInstall = $json.DownloadLinkInstall -replace '[^/]+/DragAndDropTexturing.zip',"$ver/DragAndDropTexturing.zip"
            $json[0].DownloadLinkTesting = $json.DownloadLinkTesting -replace '[^/]+/DragAndDropTexturing.zip',"$ver/DragAndDropTexturing.zip"
            $json[0].DownloadLinkUpdate = $json.DownloadLinkUpdate -replace '[^/]+/DragAndDropTexturing.zip',"$ver/DragAndDropTexturing.zip"
            $content = $json | ConvertTo-Json -AsArray
            Set-Content -Path $path -Value $content
          }

      - name: Commit feed manifests
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git branch -f main ${{ github.sha }}
          git checkout main
          git add repo.json pluginmaster.json
          git commit -m "[CI] Updating feed manifests for ${{ github.ref_name }}" || true
          git push origin main
